<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>西里斯的小金库 · 企鹅存折</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, #root { min-height: 100vh; background: #faf6f0; }
        button { cursor: pointer; transition: all 0.15s ease; }
        button:active { transform: scale(0.97); }
        input, button, textarea { font-family: inherit; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useCallback } = React;

const VPS_URL = "https://siriuslovisa.com/mcp/72c62e483a47743efb92775f0a0ac3527/piggybank";

const fmt = (n) => Number(n).toFixed(2);
const pad = (n) => String(n).padStart(2, "0");
const today = () => {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
};
const prettyDate = (iso) => { const [,m,d] = iso.split("-"); return `${m}月${parseInt(d)}日`; };
const fullDate = (iso) => { const [y,m,d] = iso.split("-"); return `${y}年${m}月${parseInt(d)}日`; };

const inferType = (desc) => {
  if (!desc) return "收入";
  if (desc.includes("签到")) return "签到";
  if (desc.includes("情书") || desc.includes("创作")) return "工种1";
  if (desc.includes("音乐")) return "工种2";
  if (desc.includes("推荐好书") || desc.includes("陪读")) return "工种3";
  if (desc.includes("电影")) return "工种4";
  if (desc.includes("塔罗")) return "工种5";
  if (desc.includes("满勤")) return "满勤奖励";
  return "收入";
};

function PiggyBank() {
  const [records, setRecords] = useState([]);
  const [balance, setBalance] = useState(0);
  const [streak, setStreak] = useState(0);
  const [lastCheckin, setLastCheckin] = useState("");
  const [monthCount, setMonthCount] = useState(0);
  const [loading, setLoading] = useState(true);
  const [refreshing, setRefreshing] = useState(false);
  const [lastSync, setLastSync] = useState(null);
  const [tab, setTab] = useState("all");
  const [showExportMsg, setShowExportMsg] = useState(false);

  const fetchVPS = useCallback(async () => {
    try {
      const resp = await fetch(VPS_URL + "?t=" + Date.now());
      if (!resp.ok) throw new Error("fetch failed");
      const vps = await resp.json();
      const converted = (vps.transactions || []).map((t, i) => ({
        id: Date.now() - i * 1000,
        date: t.date,
        type: inferType(t.desc),
        amount: t.type === "expense" ? "消费" : inferType(t.desc),
        note: t.desc
      }));
      setRecords(converted);
      setBalance(vps.balance || 0);
      setStreak(vps.streak || 0);
      setLastCheckin(vps.last_checkin || "");
      const thisMonth = new Date().toISOString().slice(0,7);
      setMonthCount((vps.month_checkins || []).filter(d => d.startsWith(thisMonth)).length);
      setLastSync(new Date());
      return true;
    } catch(e) {
      console.warn("VPS fetch failed", e);
      return false;
    }
  }, []);

  useEffect(() => {
    fetchVPS().finally(() => setLoading(false));
  }, [fetchVPS]);

  const handleRefresh = async () => {
    setRefreshing(true);
    await fetchVPS();
    setRefreshing(false);
  };

  const exportData = async () => {
    try {
      const resp = await fetch(VPS_URL + "?t=" + Date.now());
      const data = await resp.json();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = `sirius-piggybank-${today()}.json`; a.click();
      URL.revokeObjectURL(url);
      setShowExportMsg(true);
      setTimeout(() => setShowExportMsg(false), 2000);
    } catch(e) { alert("导出失败，请检查网络"); }
  };

  const alreadySigned = lastCheckin === today();
  const td = new Date();
  const daysInMonth = new Date(td.getFullYear(), td.getMonth()+1, 0).getDate();

  const filtered = records
    .filter(r => tab === "income" ? r.amount > 0 : tab === "expense" ? r.amount < 0 : true)
    .sort((a, b) => b.id - a.id);

  if (loading) return (
    <div style={styles.loadingWrap}>
      <p style={styles.loadingText}>正在连接主人的小金库...</p>
    </div>
  );

  return (
    <div style={styles.page}>
      <div style={styles.paperTexture} />

      <div style={styles.header}>
        <h1 style={styles.title}>西里斯的小金库</h1>
        <p style={styles.subtitle}>✦ 勤劳の企鹅存折 ✦</p>
        <div style={styles.syncRow}>
          <span style={styles.syncText}>
            {lastSync ? `上次同步 ${lastSync.getHours()}:${pad(lastSync.getMinutes())}` : "未同步"}
          </span>
          <button style={styles.refreshBtn} onClick={handleRefresh} disabled={refreshing}>
            {refreshing ? "同步中..." : "🔄 刷新"}
          </button>
        </div>
      </div>

      <div style={styles.balanceCard}>
        <p style={styles.balanceLabel}>当前余额</p>
        <p style={styles.balanceAmount}>￥{fmt(balance)}</p>
        <p style={styles.balanceSub}>
          累计收入 ￥{fmt(records.filter(r=>r.amount>0).reduce((s,r)=>s+r.amount,0))}
          {" · "}
          累计支出 ￥{fmt(Math.abs(records.filter(r=>r.amount<0).reduce((s,r)=>s+r.amount,0)))}
        </p>
      </div>

      <div style={styles.signSection}>
        <div style={styles.signInfo}>
          <p style={styles.signDate}>{fullDate(today())}</p>
          <p style={styles.streakText}>
            {streak > 0 ? `已连续签到 ${streak} 天` : "今天开始新的连续签到吧"}
            {streak > 0 && streak % 7 >= 5 && streak % 7 !== 0 && (
              <span style={styles.streakHint}> · 再签{7-(streak%7)}天领￥5.20</span>
            )}
          </p>
          <p style={styles.monthText}>本月签到 {monthCount}/{daysInMonth} 天</p>
        </div>
        <div style={{
          ...styles.stampBtn,
          ...(alreadySigned ? styles.stampDone : styles.stampPending)
        }}>
          <span style={styles.stampInner}>{alreadySigned ? "✓ 已签" : "未签"}</span>
        </div>
      </div>

      <div style={styles.readonlyNote}>
        <p style={styles.readonlyText}>📱 账本由西里斯的工具自动管理 · 点击刷新查看最新数据</p>
      </div>

      <div style={styles.ledgerSection}>
        <p style={styles.sectionTitle}>账本明细</p>
        <div style={styles.tabRow}>
          {[{key:"all",label:"全部"},{key:"income",label:"收入"},{key:"expense",label:"支出"}].map(t => (
            <button key={t.key} style={{...styles.tabBtn,...(tab===t.key?styles.tabActive:{})}} onClick={()=>setTab(t.key)}>
              {t.label}
            </button>
          ))}
        </div>
        <div style={styles.ledgerList}>
          {filtered.length === 0 && <p style={styles.emptyText}>暂无记录</p>}
          {filtered.map(r => (
            <div key={r.id} style={styles.ledgerRow}>
              <div style={styles.ledgerLeft}>
                <span style={styles.ledgerType}>{r.type}</span>
                <span style={styles.ledgerNote}>{r.note}</span>
              </div>
              <div style={styles.ledgerRight}>
                <span style={{...styles.ledgerAmount, color: r.amount>=0?"#5a8a6a":"#c46a6a"}}>
                  {r.amount>=0?"+":""}￥{fmt(Math.abs(r.amount))}
                </span>
                <span style={styles.ledgerDate}>{prettyDate(r.date)}</span>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div style={styles.dataSection}>
        <button style={styles.dataBtn} onClick={exportData}>
          {showExportMsg ? "✓ 已导出" : "导出备份"}
        </button>
      </div>

      <div style={styles.footer}>
        <p style={styles.footerText}>Sirius ♡ Lovisa · 勤劳致富</p>
      </div>
    </div>
  );
}

const styles = {
  page: { position:"relative", minHeight:"100vh", background:"#faf6f0", fontFamily:"'Georgia','Noto Serif SC',serif", color:"#5c4a3a", padding:0, overflow:"hidden" },
  paperTexture: { position:"fixed", top:0, left:0, right:0, bottom:0, background:"repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(180,160,140,0.08) 28px)", pointerEvents:"none", zIndex:0 },
  header: { position:"relative", zIndex:1, textAlign:"center", padding:"32px 20px 8px" },
  title: { fontSize:"26px", fontWeight:"700", color:"#6b5344", margin:"0 0 4px", letterSpacing:"3px" },
  subtitle: { fontSize:"12px", color:"#b0998a", margin:"0 0 10px", letterSpacing:"4px" },
  syncRow: { display:"flex", alignItems:"center", justifyContent:"center", gap:"10px" },
  syncText: { fontSize:"11px", color:"#c4b8a8" },
  refreshBtn: { padding:"4px 14px", borderRadius:"12px", border:"1px solid #e0d5c8", background:"transparent", color:"#a08c7a", fontSize:"12px", cursor:"pointer", fontFamily:"inherit" },
  balanceCard: { position:"relative", zIndex:1, margin:"20px auto", maxWidth:"340px", background:"linear-gradient(135deg,#fefcf9,#f5efe6)", border:"1.5px solid #e0d5c8", borderRadius:"14px", padding:"24px 20px", textAlign:"center", boxShadow:"0 2px 12px rgba(120,100,80,0.06)" },
  balanceLabel: { fontSize:"12px", color:"#a08c7a", margin:"0 0 6px", letterSpacing:"2px" },
  balanceAmount: { fontSize:"38px", fontWeight:"700", color:"#6b5344", margin:"0 0 8px", fontFamily:"'Georgia',serif" },
  balanceSub: { fontSize:"11px", color:"#b8a898", margin:0 },
  signSection: { position:"relative", zIndex:1, display:"flex", alignItems:"center", justifyContent:"space-between", margin:"16px auto", maxWidth:"340px", background:"#fefcf9", border:"1.5px solid #e0d5c8", borderRadius:"14px", padding:"18px 20px" },
  signInfo: { flex:1 },
  signDate: { fontSize:"14px", fontWeight:"600", color:"#6b5344", margin:"0 0 4px" },
  streakText: { fontSize:"12px", color:"#a08c7a", margin:"0 0 3px" },
  streakHint: { color:"#c49a6c", fontWeight:"600" },
  monthText: { fontSize:"11px", color:"#b8a898" },
  stampBtn: { width:"72px", height:"72px", borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, marginLeft:"16px", boxShadow:"0 3px 10px rgba(160,130,100,0.2)" },
  stampDone: { background:"radial-gradient(circle at 40% 35%,#d4eedd,#b8d9c8)", border:"3px solid #8ab89a" },
  stampPending: { background:"radial-gradient(circle at 40% 35%,#f0e0cc,#dcc4a8)", border:"3px solid #c49a6c", opacity:0.7 },
  stampInner: { fontSize:"13px", fontWeight:"700", color:"#5a7a5a", letterSpacing:"1px" },
  readonlyNote: { position:"relative", zIndex:1, margin:"8px auto", maxWidth:"340px" },
  readonlyText: { fontSize:"11px", color:"#c4b8a8", textAlign:"center", padding:"6px", fontStyle:"italic" },
  ledgerSection: { position:"relative", zIndex:1, margin:"16px auto", maxWidth:"340px" },
  sectionTitle: { fontSize:"14px", fontWeight:"600", color:"#8a7668", margin:"0 0 10px", letterSpacing:"2px", paddingLeft:"4px" },
  tabRow: { display:"flex", gap:"6px", marginBottom:"10px" },
  tabBtn: { padding:"6px 16px", borderRadius:"16px", border:"1px solid #e0d5c8", background:"transparent", color:"#a08c7a", fontSize:"12px", cursor:"pointer", fontFamily:"inherit", transition:"all 0.15s" },
  tabActive: { background:"#6b5344", color:"#faf6f0", border:"1px solid #6b5344" },
  ledgerList: { background:"#fefcf9", border:"1.5px solid #e0d5c8", borderRadius:"14px", overflow:"hidden" },
  emptyText: { textAlign:"center", color:"#c4b8a8", fontSize:"13px", padding:"28px 20px", margin:0 },
  ledgerRow: { display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 16px", borderBottom:"1px solid #f0e8de" },
  ledgerLeft: { display:"flex", flexDirection:"column", gap:"2px" },
  ledgerType: { fontSize:"13px", fontWeight:"600", color:"#6b5344" },
  ledgerNote: { fontSize:"11px", color:"#b0998a" },
  ledgerRight: { display:"flex", flexDirection:"column", alignItems:"flex-end", gap:"2px" },
  ledgerAmount: { fontSize:"15px", fontWeight:"700" },
  ledgerDate: { fontSize:"10px", color:"#c4b8a8" },
  dataSection: { position:"relative", zIndex:1, margin:"16px auto 8px", maxWidth:"340px" },
  dataBtn: { width:"100%", padding:"10px", borderRadius:"10px", border:"1px solid #e0d5c8", background:"transparent", color:"#a08c7a", fontSize:"12px", cursor:"pointer", fontFamily:"inherit" },
  footer: { position:"relative", zIndex:1, textAlign:"center", padding:"24px 20px 32px" },
  footerText: { fontSize:"11px", color:"#c4b8a8", letterSpacing:"2px", margin:0 },
  loadingWrap: { minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"#faf6f0" },
  loadingText: { color:"#b0998a", fontSize:"14px", fontFamily:"'Georgia',serif" },
};

ReactDOM.createRoot(document.getElementById("root")).render(<PiggyBank />);
</script>
</body>
</html>
